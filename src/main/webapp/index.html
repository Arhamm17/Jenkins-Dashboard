<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DevOps</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      background: #1e293b;
      padding: 3rem 2.5rem;
      border-radius: 12px;
      border: 1px solid #334155;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      max-width: 420px;
      width: 90%;
    }

    h1 {
      color: #60a5fa;
      margin-bottom: 0.5rem;
      font-size: 2rem;
    }

    p {
      color: #94a3b8;
      margin-bottom: 1.5rem;
      font-size: 0.95rem;
    }

    .badge {
      display: inline-block;
      padding: 0.4rem 0.8rem;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 20px;
      font-size: 0.75rem;
      color: #60a5fa;
      margin-bottom: 1.5rem;
    }

    a {
      display: inline-block;
      text-decoration: none;
      background: #2563eb;
      color: white;
      padding: 0.7rem 1.5rem;
      border-radius: 8px;
      font-size: 1rem;
      transition: 0.2s ease;
    }

    a:hover {
      background: #1d4ed8;
      transform: translateY(-2px);
    }

    .footer {
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: #64748b;
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="badge">🚀 DevOps Project</div>

    <h1>Jenkins Dashboard</h1>
    <p>Welcome to my CI/CD powered application deployed via Jenkins pipeline.</p>

    <a href="dashboard.html">Go to Jenkins Dashboard</a>

    <div class="footer">
      Built using Jenkins • Git • GitHub • Tomcat9 • AWS EC2 • JAVA • Maven
    </div>
  </div>

</body>
</html>
